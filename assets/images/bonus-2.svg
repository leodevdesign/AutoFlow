<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#160900"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="og2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#FAA429"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="280" fill="url(#bg2)"/>
  <g stroke="#FF6A00" stroke-width="0.4" opacity="0.06">
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="40" y1="0" x2="40" y2="280"/><line x1="80" y1="0" x2="80" y2="280"/>
    <line x1="120" y1="0" x2="120" y2="280"/><line x1="160" y1="0" x2="160" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/><line x1="240" y1="0" x2="240" y2="280"/>
    <line x1="280" y1="0" x2="280" y2="280"/><line x1="320" y1="0" x2="320" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
  </g>
  <ellipse cx="200" cy="120" rx="100" ry="80" fill="#FF6A00" opacity="0.05" filter="url(#glow2)"/>

  <!-- Flow diagram icons -->
  <!-- Node 1 -->
  <rect x="68" y="90" width="52" height="38" rx="8" fill="#1a0900" stroke="url(#og2)" stroke-width="1.5"/>
  <text x="94" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FF6A00">▶</text>
  <text x="94" y="120" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">START</text>
  <!-- Arrow 1 -->
  <line x1="120" y1="109" x2="148" y2="109" stroke="#FF6A00" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>
  <polygon points="148,106 155,109 148,112" fill="#FF6A00" opacity="0.7"/>
  <!-- Node 2 -->
  <rect x="155" y="90" width="52" height="38" rx="8" fill="#1a0900" stroke="url(#og2)" stroke-width="1.5"/>
  <text x="181" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FF6A00">⚡</text>
  <text x="181" y="120" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">AUTO</text>
  <!-- Arrow 2 -->
  <line x1="207" y1="109" x2="235" y2="109" stroke="#FF6A00" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>
  <polygon points="235,106 242,109 235,112" fill="#FF6A00" opacity="0.7"/>
  <!-- Node 3 -->
  <rect x="242" y="90" width="52" height="38" rx="8" fill="#FF6A00" opacity="0.9"/>
  <text x="268" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff">💰</text>
  <text x="268" y="120" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#fff">VENDA</text>

  <!-- Stacked "templates" visual -->
  <rect x="155" y="148" width="100" height="6" rx="3" fill="#222" stroke="#333" stroke-width="0.5"/>
  <rect x="158" y="143" width="94" height="6" rx="3" fill="#2a2a2a" stroke="#333" stroke-width="0.5"/>
  <rect x="161" y="138" width="88" height="6" rx="3" fill="#333" stroke="#444" stroke-width="0.5"/>

  <!-- Tag pill -->
  <rect x="130" y="18" width="140" height="26" rx="13" fill="rgba(255,106,0,0.15)" stroke="rgba(255,106,0,0.5)" stroke-width="1"/>
  <text x="200" y="35" text-anchor="middle" font-family="Aldrich, sans-serif" font-size="11" fill="#FF6A00" letter-spacing="1">+50 FLUXOS PRONTOS</text>

  <!-- Count highlight -->
  <text x="200" y="186" text-anchor="middle" font-family="Aldrich, sans-serif" font-size="38" font-weight="700" fill="url(#og2)" opacity="0.15">50+</text>

  <text x="200" y="210" text-anchor="middle" font-family="Aldrich, sans-serif" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="1">BIBLIOTECA DE FLUXOS</text>
  <text x="200" y="232" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaaaaa">Templates prontos para copiar, colar e vender</text>
  <rect x="150" y="252" width="100" height="2" rx="1" fill="url(#og2)"/>
  <path d="M14 14 L34 14 L34 16 L16 16 L16 34 L14 34Z" fill="#FF6A00" opacity="0.4"/>
  <path d="M386 14 L366 14 L366 16 L384 16 L384 34 L386 34Z" fill="#FF6A00" opacity="0.4"/>
</svg>
