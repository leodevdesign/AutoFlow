<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#160900"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="og3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#FAA429"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="280" fill="url(#bg3)"/>
  <g stroke="#FF6A00" stroke-width="0.4" opacity="0.06">
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="40" y1="0" x2="40" y2="280"/><line x1="80" y1="0" x2="80" y2="280"/>
    <line x1="120" y1="0" x2="120" y2="280"/><line x1="160" y1="0" x2="160" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/><line x1="240" y1="0" x2="240" y2="280"/>
    <line x1="280" y1="0" x2="280" y2="280"/><line x1="320" y1="0" x2="320" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
  </g>
  <ellipse cx="200" cy="120" rx="90" ry="70" fill="#FF6A00" opacity="0.05" filter="url(#glow3)"/>

  <!-- Chat bubble main (bot reply) -->
  <rect x="120" y="72" width="150" height="54" rx="12" fill="#1a0900" stroke="url(#og3)" stroke-width="1.5"/>
  <path d="M160 126 L155 138 L170 126Z" fill="#1a0900" stroke="url(#og3)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Bot icon inside bubble -->
  <rect x="133" y="83" width="22" height="22" rx="5" fill="url(#og3)"/>
  <circle cx="140" cy="90" r="3" fill="#fff"/>
  <circle cx="148" cy="90" r="3" fill="#fff"/>
  <path d="M138 96 Q144 100 150 96" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="144" y1="83" x2="144" y2="78" stroke="url(#og3)" stroke-width="1.5"/>
  <circle cx="144" cy="76" r="2" fill="#FF6A00"/>
  <!-- Text lines in bubble -->
  <rect x="162" y="87" width="96" height="5" rx="2.5" fill="#333"/>
  <rect x="162" y="96" width="72" height="5" rx="2.5" fill="#2a2a2a"/>
  <rect x="162" y="105" width="84" height="5" rx="2.5" fill="#222"/>

  <!-- User chat bubble (small, left) -->
  <rect x="84" y="140" width="90" height="28" rx="10" fill="#111" stroke="#333" stroke-width="1"/>
  <path d="M120 168 L115 178 L130 168Z" fill="#111" stroke="#333" stroke-width="1" stroke-linejoin="round"/>
  <rect x="96" y="150" width="66" height="5" rx="2.5" fill="#444"/>
  <rect x="96" y="158" width="48" height="5" rx="2.5" fill="#3a3a3a"/>

  <!-- Response bubble (right, orange) -->
  <rect x="220" y="140" width="100" height="28" rx="10" fill="#FF6A00" opacity="0.15" stroke="#FF6A00" stroke-width="1" stroke-opacity="0.4"/>
  <path d="M270 168 L275 178 L260 168Z" fill="rgba(255,106,0,0.15)" stroke="#FF6A00" stroke-width="1" stroke-opacity="0.4" stroke-linejoin="round"/>
  <rect x="232" y="150" width="76" height="5" rx="2.5" fill="#FF6A00" opacity="0.4"/>
  <rect x="232" y="158" width="54" height="5" rx="2.5" fill="#FF6A00" opacity="0.3"/>

  <!-- Tag pill -->
  <rect x="130" y="18" width="140" height="26" rx="13" fill="rgba(255,106,0,0.15)" stroke="rgba(255,106,0,0.5)" stroke-width="1"/>
  <text x="200" y="35" text-anchor="middle" font-family="Aldrich, sans-serif" font-size="11" fill="#FF6A00" letter-spacing="1">AUTOMAÇÃO NO DM</text>

  <text x="200" y="210" text-anchor="middle" font-family="Aldrich, sans-serif" font-size="17" font-weight="700" fill="#ffffff" letter-spacing="1">BOT DE VENDAS NO DM</text>
  <text x="200" y="232" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaaaaa">Template de bot que fecha clientes automaticamente</text>
  <rect x="150" y="252" width="100" height="2" rx="1" fill="url(#og3)"/>
  <path d="M14 14 L34 14 L34 16 L16 16 L16 34 L14 34Z" fill="#FF6A00" opacity="0.4"/>
  <path d="M386 14 L366 14 L366 16 L384 16 L384 34 L386 34Z" fill="#FF6A00" opacity="0.4"/>
</svg>
