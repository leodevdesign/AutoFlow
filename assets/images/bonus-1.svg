<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#160900"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="og1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#FAA429"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="280" fill="url(#bg1)"/>
  <!-- Grid -->
  <g stroke="#FF6A00" stroke-width="0.4" opacity="0.06">
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="40" y1="0" x2="40" y2="280"/><line x1="80" y1="0" x2="80" y2="280"/>
    <line x1="120" y1="0" x2="120" y2="280"/><line x1="160" y1="0" x2="160" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/><line x1="240" y1="0" x2="240" y2="280"/>
    <line x1="280" y1="0" x2="280" y2="280"/><line x1="320" y1="0" x2="320" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
  </g>
  <!-- Glow -->
  <ellipse cx="200" cy="130" rx="100" ry="80" fill="#FF6A00" opacity="0.06" filter="url(#glow1)"/>
  <!-- Infinity symbol -->
  <g transform="translate(200,118)" filter="url(#glow1)">
    <path d="M-52 0 C-52 -28 -28 -46 0 -46 C28 -46 46 -22 46 0 C46 22 28 46 0 46 C-28 46 -46 22 -46 0 Z" fill="none" stroke="url(#og1)" stroke-width="8" opacity="0.15"/>
    <path d="M-62 0 C-62 -34 -36 -56 0 -56 C36 -56 62 -28 62 0" fill="none" stroke="url(#og1)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <path d="M62 0 C62 28 36 56 0 56 C-36 56 -62 28 -62 0" fill="none" stroke="url(#og1)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <!-- Inner overlap -->
    <ellipse cx="-20" cy="0" rx="22" ry="22" fill="none" stroke="#FF6A00" stroke-width="5" opacity="0.6"/>
    <ellipse cx="20" cy="0" rx="22" ry="22" fill="none" stroke="#FF6A00" stroke-width="5" opacity="0.6"/>
  </g>
  <!-- Star dots -->
  <circle cx="138" cy="118" r="4" fill="#FF6A00" opacity="0.9"/>
  <circle cx="262" cy="118" r="4" fill="#FF6A00" opacity="0.9"/>
  <!-- Tag pill -->
  <rect x="144" y="18" width="112" height="26" rx="13" fill="rgba(255,106,0,0.15)" stroke="rgba(255,106,0,0.5)" stroke-width="1"/>
  <text x="200" y="35" text-anchor="middle" font-family="Aldrich, sans-serif" font-size="11" fill="#FF6A00" letter-spacing="1">ACESSO VITALÍCIO</text>
  <!-- Bottom text -->
  <text x="200" y="210" text-anchor="middle" font-family="Aldrich, sans-serif" font-size="19" font-weight="700" fill="#ffffff" letter-spacing="1">MÉTODO COMPLETO</text>
  <text x="200" y="232" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaaaaa">Acesso ilimitado + todas as atualizações futuras</text>
  <!-- Bottom accent bar -->
  <rect x="150" y="252" width="100" height="2" rx="1" fill="url(#og1)"/>
  <!-- Corner markers -->
  <path d="M14 14 L34 14 L34 16 L16 16 L16 34 L14 34Z" fill="#FF6A00" opacity="0.4"/>
  <path d="M386 14 L366 14 L366 16 L384 16 L384 34 L386 34Z" fill="#FF6A00" opacity="0.4"/>
</svg>
